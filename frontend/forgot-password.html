<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Reset Password — Faceless AI Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: #0a0e1a;
            color: #fff;
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            -webkit-font-smoothing: antialiased;
        }

        .bg-canvas {
            position: fixed; inset: 0; z-index: 0;
            background:
                radial-gradient(ellipse 70% 50% at 50% 0%, rgba(37,106,244,0.1), transparent 60%),
                #0a0e1a;
        }

        .card {
            position: relative; z-index: 1;
            background: rgba(15,22,41,0.8);
            border: 1px solid #1e2d4a;
            border-radius: 24px;
            padding: 3rem 2.5rem;
            text-align: center;
            max-width: 400px; width: 90%;
            box-shadow: 0 24px 60px rgba(0,0,0,0.5);
            backdrop-filter: blur(20px);
            animation: fadeUp 0.6s ease both;
        }

        .icon-wrap {
            width: 64px; height: 64px;
            border-radius: 18px;
            background: rgba(37,106,244,0.12);
            border: 1px solid rgba(37,106,244,0.25);
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 1.5rem;
        }

        .material-symbols-outlined { font-size: 2rem; color: #256af4; }

        h1 { font-size: 1.4rem; font-weight: 800; margin-bottom: 0.75rem; letter-spacing: -0.02em; }

        p { font-size: 0.85rem; color: #94a3b8; line-height: 1.7; margin-bottom: 2rem; }

        .btn {
            display: inline-flex; align-items: center; gap: 0.5rem;
            padding: 0.8rem 2rem;
            background: #256af4;
            color: #fff; font-weight: 700; font-size: 0.875rem;
            border-radius: 10px; text-decoration: none;
            box-shadow: 0 4px 20px rgba(37,106,244,0.3);
            transition: background 0.2s, transform 0.15s;
        }

        .btn:hover { background: #1a5ce5; transform: translateY(-1px); }

        .countdown {
            margin-top: 1.5rem;
            font-size: 0.75rem; color: #64748b;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="bg-canvas"></div>
    <div class="card">
        <div class="icon-wrap">
            <span class="material-symbols-outlined">lock_reset</span>
        </div>
        <h1>Password Reset</h1>
        <p>
            Clerk handles password reset securely through the Sign In page.
            Click the <strong>"Forgot password?"</strong> link on the login screen to receive a reset email.
        </p>
        <a class="btn" href="./login.html">
            <span class="material-symbols-outlined" style="font-size:1.1rem;">arrow_back</span>
            Go to Sign In
        </a>
        <p class="countdown" id="redirect-msg">Redirecting in <span id="seconds">5</span>s…</p>
    </div>
    <script>
        let s = 5;
        const el = document.getElementById('seconds');
        const interval = setInterval(() => {
            s--;
            if (el) el.textContent = s;
            if (s <= 0) {
                clearInterval(interval);
                window.location.replace('./login.html');
            }
        }, 1000);
    </script>
</body>
</html>
